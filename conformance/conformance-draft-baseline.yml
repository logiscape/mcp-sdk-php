# MCP Conformance Draft-Track Baseline
#
# Expected failures for the DRAFT track only: the `draft` suite of the
# pinned 0.2.0-alpha conformance tool (npm alias "conformance-draft" in
# package.json), which carries the 2026-07-28 draft-spec scenarios.
# The stable track keeps its own baseline in conformance-baseline.yml —
# the two files are tied to different installed tool versions and are
# curated independently (see docs/v2-development-plan.md, WS7).
#
# Until the v2 stateless core lands (WS1-WS3 in the development plan),
# draft-only scenarios are expected to fail: the SDK on `main` still
# implements the 2025-11-25 lifecycle. Each entry below names the
# workstream that will make it pass; entries only shrink as workstreams
# complete. The no-shortcut rule in conformance/README.md applies to this
# file exactly as it does to the stable baseline.
#
# Last updated: 2026-06-12 (WS2 milestone)
# Conformance tool version: 0.2.0-alpha.2 (draft pin)

server:
  # (WS2's per-request era detection landed 2026-06-12: the server accepts
  # the DRAFT-2026-v1 identifier as an alias for 2026-07-28 on the
  # per-request stateless path, serves every modern request sessionless
  # with the SEP-2575 status mapping (400 for -32602/-32003/-32004, 404 +
  # -32601 for unknown/removed methods), and adopts version/clientInfo/
  # clientCapabilities from each request's _meta envelope. WS2 entries
  # removed as now passing: `sep-2164-resource-not-found` (3/3) and
  # `caching` (7/7). Also removed `http-custom-header-server-validation`:
  # its checks only activate when the server exposes a tool with
  # x-mcp-header annotations, which none does yet — the tool reports the
  # scenario as passing with 0 checks, and the baseline gate flags the
  # entry as stale. WS3's SEP-2243 work adds such a tool and re-baselines
  # honestly if its checks then fail.)

  # --- WS3 (transport changes) + one upstream tool bug ---
  - server-stateless
    # 17/19 checks pass after WS2 (era detection, discover, removed-method
    # 404s, -32004/-32602 statuses, missing-capability -32003 with HTTP
    # 400, no session-id echo). Note: the two capability checks were
    # silently SKIPPED in earlier WS2 runs — McpServer's tools/call
    # wrapper converted the SDK-raised McpError into an isError tool
    # result, so no -32003 reached the wire; the wrapper now propagates
    # McpError as protocol errors, and both checks actually execute.
    # The two failing checks:
    #
    # 1. sep-2575-http-server-header-mismatch-400 (WS3): a request whose
    #    MCP-Protocol-Version header disagrees with the _meta value must
    #    be rejected -32001 HeaderMismatch (we currently answer from the
    #    envelope, yielding -32004) — that validation is SEP-2243, a WS3
    #    deliverable per the plan.
    #
    # 2. sep-2575-server-rejects-undeclared-capability (UPSTREAM TOOL
    #    BUG, not pursued in the SDK): the SDK emits
    #    data.requiredCapabilities as a ClientCapabilities OBJECT
    #    ({"sampling": {}}), which is what the SEP-2575 final text, the
    #    draft schema.ts, its canonical example
    #    (MissingRequiredClientCapabilityError/missing-elicitation-capability.json),
    #    and the TypeScript SDK v2 types all specify. The conformance
    #    tool asserts a string array (["sampling"]) — on the pinned
    #    0.2.0-alpha.2 AND on conformance main as of 2026-06-12, where
    #    the check contradicts the repo's own vendored draft types.
    #    Official text wins (guiding principle; see conformance/README.md
    #    no-shortcuts rule): the SDK keeps the schema shape and this
    #    check stays an expected failure until the tool is fixed
    #    upstream. Re-check at every draft-pin bump; candidate for an
    #    upstream issue/PR per SEP-2484. The companion check
    #    sep-2575-missing-capability-http-400 (status only) passes.
    #
    # Two SHOULD-level warnings also remain (prompts/tools list_changed
    # notifications on an open subscriptions/listen stream), which need
    # WS3's subscriptions/listen channel.

  - http-header-validation
    # Mcp-Method/Mcp-Name header validation and HeaderMismatch (-32001)
    # rejection not yet implemented (3/8 checks pass after WS2).

  # --- WS3 (transport changes: SEP-2322 InputRequiredResult) ---
  # The multi-round-trip input mechanism replacing server-initiated
  # sampling/elicitation/roots requests is not yet implemented; the
  # existing suspend/resume pattern still uses server-initiated requests.
  - input-required-result-basic-elicitation
  - input-required-result-basic-sampling
  - input-required-result-basic-list-roots
  - input-required-result-request-state
  - input-required-result-multiple-input-requests
  - input-required-result-multi-round
  - input-required-result-missing-input-response
  - input-required-result-non-tool-request
  - input-required-result-result-type
  - input-required-result-tampered-state
  - input-required-result-capability-check
  - input-required-result-ignore-extra-params

client:
  # (WS1's json-schema-ref-no-deref entry removed 2026-06-12: the client
  # passes 2020-12 schemas through verbatim and never dereferences network
  # $refs — scenario passing.)

  # --- WS3 (transport changes: SEP-2243 request-metadata headers) ---
  - request-metadata
    # Mcp-Method/Mcp-Name header emission not yet implemented.

  - http-custom-headers
    # Mcp-Param-* mirroring of designated tool parameters not yet
    # implemented.

  - http-invalid-tool-headers
    # Client-side rejection rules for invalid x-mcp-header mappings not
    # yet implemented.

  # --- WS3 (transport changes: SEP-2322 InputRequiredResult) ---
  - sep-2322-client-request-state
    # Client side of the multi-round-trip input mechanism (inputResponses,
    # requestState round-tripping) not yet implemented.

  # --- WS3 (authorization hardening) ---
  - auth/iss-supported
  - auth/iss-not-advertised
  - auth/iss-supported-missing
  - auth/iss-wrong-issuer
  - auth/iss-unexpected
  - auth/iss-normalized
    # SEP-2468 `iss` parameter validation (RFC 9207) not yet implemented;
    # one to two checks fail per iss scenario.

  - auth/authorization-server-migration
    # SEP-2352 credential binding to the issuing server's issuer not yet
    # implemented.

  - auth/offline-access-not-supported
    # SEP-2207 refresh-token clarification: one check fails at the draft
    # version (refresh behavior when offline_access is unsupported).
