# MCP Conformance Draft-Track Baseline
#
# Expected failures for the DRAFT track only: the `draft` suite of the
# pinned 0.2.0-alpha conformance tool (npm alias "conformance-draft" in
# package.json), which carries the 2026-07-28 draft-spec scenarios.
# The stable track keeps its own baseline in conformance-baseline.yml —
# the two files are tied to different installed tool versions and are
# curated independently (see docs/v2-development-plan.md, WS7).
#
# Until the v2 stateless core lands (WS1-WS3 in the development plan),
# draft-only scenarios are expected to fail: the SDK on `main` still
# implements the 2025-11-25 lifecycle. Each entry below names the
# workstream that will make it pass; entries only shrink as workstreams
# complete. The no-shortcut rule in conformance/README.md applies to this
# file exactly as it does to the stable baseline.
#
# Last updated: 2026-06-12 (WS3 milestone)
# Conformance tool version: 0.2.0-alpha.2 (draft pin)

server:
  # (WS3's transport changes landed 2026-06-12: SEP-2243 request-metadata
  # header validation — Mcp-Method/Mcp-Name presence+match, OWS trimming,
  # case-sensitive values, version-header/_meta mismatch, and Mcp-Param-*
  # designated-parameter validation with strict base64-sentinel decoding —
  # all rejected 400/-32001; the SEP-2322 multi-round-trip mechanism
  # (InputRequiredResult with HMAC-signed requestState, ephemeral
  # re-execution, capability-gated input requests, prompts/get support);
  # and the SEP-2575 streaming surface (request-scoped SSE for
  # handler-emitted notifications, subscriptions/listen with the
  # acknowledgement-first stream, subscriptionId tagging, and strict
  # filter containment). WS3 entries removed as now passing:
  # `http-header-validation` (13/13), `http-custom-header-server-
  # validation` (9/9, activated by the new test_header_params fixture
  # tool), and all twelve `input-required-result-*` scenarios.)

  # --- One upstream tool bug ---
  - server-stateless
    # 22/23 checks pass after WS3, including
    # sep-2575-http-server-header-mismatch-400 (-32001 before -32004),
    # the subscriptions/listen acknowledgement-first and subscriptionId
    # checks, and the notification-filter containment check.
    #
    # The one failing check, sep-2575-server-rejects-undeclared-capability
    # (UPSTREAM TOOL BUG, not pursued in the SDK): the SDK emits
    # data.requiredCapabilities as a ClientCapabilities OBJECT
    # ({"sampling": {}}), which is what the SEP-2575 final text, the
    # draft schema.ts, its canonical example
    # (MissingRequiredClientCapabilityError/missing-elicitation-capability.json),
    # and the TypeScript SDK v2 types all specify. The conformance
    # tool asserts a string array (["sampling"]) — on the pinned
    # 0.2.0-alpha.2 AND on conformance main as of 2026-06-12, where
    # the check contradicts the repo's own vendored draft types.
    # Official text wins (guiding principle; see conformance/README.md
    # no-shortcuts rule): the SDK keeps the schema shape and this
    # check stays an expected failure until the tool is fixed
    # upstream. Re-check at every draft-pin bump; candidate for an
    # upstream issue/PR per SEP-2484. The companion check
    # sep-2575-missing-capability-http-400 (status only) passes.
    #
    # The two SHOULD-level warnings (prompts/tools list_changed delivered
    # to an open subscriptions/listen stream) pass only where PHP's CLI
    # server can run multiple workers (PHP_CLI_SERVER_WORKERS, POSIX
    # only — run-conformance.php sets it automatically): the trigger
    # tools/call must be served concurrently with the open stream. On
    # Windows dev machines the events cannot be exercised locally;
    # warnings do not fail the scenario either way.

client:
  # --- Two stale-tool entries (WS3 review rounds) ---
  - auth/pre-registration
    # UPSTREAM SPEC/TOOL DRIFT, not pursued in the SDK: the 2026-07-28
    # draft's Authorization Server Binding rule (client-registration
    # page) requires pre-registered credentials to be keyed by the
    # issuer that registered them ("MUST associate those credentials
    # with the specific authorization server that issued them, keyed by
    # the authorization server's `issuer` identifier"), but the pinned
    # 0.2.0-alpha.2 tool (upstream commit 25fd4432) supplies only
    # {client_id, client_secret} as scenario context — no issuer — even
    # though the scenario is tagged DRAFT-2026-v1 and the AS URL is
    # known when the context is built. The SDK's draft-default is
    # mandatory issuer binding, so the draft-track everything-client
    # (spawned with --track=draft) correctly refuses to send a token
    # request with unbound credentials and the scenario's
    # pre-registration-auth check fails ("Client did not make a token
    # request"; 2/3 checks pass). The stable track still passes 14/14 —
    # there the published 2025-11-25 spec has no binding rule and the
    # everything-client opts into the SDK's explicit
    # allowUnboundClientCredentials legacy compatibility.
    #
    # NOTE: --suite draft selects only DRAFT-2026-v1-exclusive scenarios,
    # and auth/pre-registration is tagged [2025-11-25, DRAFT-2026-v1], so
    # it is NOT in the draft suite. run-conformance.php therefore runs it
    # explicitly after the suite on the aggregate `draft`/`client-draft`
    # gate (see DRAFT_CLIENT_EXTRA_SCENARIOS) so this entry is actually
    # evaluated — otherwise a stale entry (upstream adds issuer context,
    # or asserts the strict refusal) would never be checked and would pass
    # CI silently. Keep DRAFT_CLIENT_EXTRA_SCENARIOS in sync with any
    # client entry here that falls outside the draft suite.
    # Re-check at every draft-pin bump: expect upstream to either add
    # issuer context to the scenario or assert the strict refusal.
    # Candidate for an upstream issue per SEP-2484. See the upstream
    # drift record in docs/v2-development-plan.md (WS3).
  - http-custom-headers
    # UPSTREAM TOOL STALENESS, not pursued in the SDK: the scenario's
    # advertised tools annotate `number`-typed parameters
    # (priority/float_val) with x-mcp-header and REQUIRE the client to
    # mirror them — but the final SEP-2243 text explicitly prohibits
    # x-mcp-header on type `number` (string/integer/boolean only) and
    # mandates that HTTP clients REJECT tool definitions violating the
    # constraints. The SDK follows the final text (the WS3 review
    # confirmed the prohibition), so it excludes the scenario's tools as
    # invalid and never mirrors them; the scenario's five checks then
    # fail unexercised. The companion http-invalid-tool-headers scenario
    # (which has no number case) passes 11/11, as does
    # http-custom-header-server-validation on the server track (its
    # fixture uses a string parameter). Re-check at every draft-pin
    # bump; candidate for an upstream scenario fix per SEP-2484.

  # (Otherwise empty as of the WS3 milestone, 2026-06-12. Removed as now
  # passing:
  # - request-metadata: closed by an everything-client handler exercising
  #   the SEP-2575 envelope/version-header obligations the checks actually
  #   assert — the earlier baseline comment mis-attributed this scenario
  #   to Mcp-Method/Mcp-Name emission, which it never checked.
  # - http-custom-headers / http-invalid-tool-headers: SEP-2243
  #   Mcp-Param-* mirroring with the base64 sentinel encoding, plus
  #   client-side rejection (exclusion) of tools with invalid
  #   x-mcp-header annotations.
  # - sep-2322-client-request-state: the client MRTR loop — verbatim
  #   requestState echo, fresh JSON-RPC ids, key-matched inputResponses,
  #   per-call isolation, absent resultType treated as complete.
  # - auth/iss-*: SEP-2468 RFC 9207 iss validation (non-normalized
  #   comparison; reject scenarios exit before any token exchange).
  # - auth/authorization-server-migration: SEP-2352 PRM re-fetch on 401 +
  #   re-registration at the new AS without credential reuse.
  # - auth/offline-access-not-supported: its one failing check was
  #   SEP-837's cross-cutting application_type assertion in the mock
  #   AS's registration handler (now sent on every DCR), not refresh
  #   behavior — the earlier comment mis-attributed it.
  # - json-schema-ref-no-deref had already left with WS1.)
