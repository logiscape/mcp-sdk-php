# MCP Conformance Draft-Track Baseline
#
# Expected failures for the DRAFT track only: the `draft` suite of the
# pinned 0.2.0-alpha conformance tool (npm alias "conformance-draft" in
# package.json), which carries the 2026-07-28 draft-spec scenarios.
# The stable track keeps its own baseline in conformance-baseline.yml —
# the two files are tied to different installed tool versions and are
# curated independently (see docs/v2-development-plan.md, WS7).
#
# The no-shortcut rule in conformance/README.md applies to this file
# exactly as it does to the stable baseline: every entry has a documented
# root cause and either a plan or an explicit not-pursuing rationale;
# entries only shrink within a pinned tool version. A deliberate pin bump
# may legitimately add entries for genuinely-new upstream behavior, each
# with its own root cause (recorded below).
#
# Last updated: 2026-07-03 (request-metadata cleared via SDK fix; other
# root causes re-verified against the reference SDKs, the draft spec
# text, and the tool source — details per entry)
# Conformance tool version: 0.2.0-alpha.9 (draft pin)
#
# (CLEARED at pin 0.2.0-alpha.9, 2026-07-03, via SDK FIX) request-metadata —
# the entry's open question ("should the SDK retry an already-attempted-but-
# advertised version exactly once?") was resolved YES against three sources:
#  * Spec: the draft's only retry rule is unconditional — "The client SHOULD
#    select a mutually supported version from the `supported` list and retry
#    the request" (basic/versioning.mdx §Protocol Version Negotiation). No
#    text anywhere excludes a version the client already attempted (verified
#    absence across versioning/discover/transports/schema.ts).
#  * Reference SDKs: the TypeScript client retries the SAME rejected version
#    exactly once (packages/client/src/client/versionNegotiation.ts, one-shot
#    `correctiveUsed` guard: "runs exactly once (even when the mutual version
#    equals the just-rejected one)"); the Python client likewise
#    (src/mcp/client/_probe.py, `attempt == 0` bound). Neither excludes
#    attempted versions.
#  * Tool history: conformance issue #280 (closed via PR #270) documents the
#    same-version transient rejection as the scenario's intended design
#    ("infinite loops are prevented (since we never retry more than once)").
# SDK change: ClientSession::negotiate() now allows exactly one corrective
# -32022 retry (same version permitted) and throws on a second rejection;
# pickAdvertisedModernVersion() dropped its attempted-versions exclusion
# (sendRequest()'s adopt-and-retry was already structurally once-only).
# Covered by ClientNegotiationTest (same-version retry, second-rejection
# stop, forced-modern same-version adopt-and-retry).
#
# Pin-bump note (0.2.0-alpha.7 -> 0.2.0-alpha.9, 2026-07-01): two builds,
# three PRs, all draft-track only (stable `latest` unchanged at 0.1.16).
#  * #376 (alpha.9) fixed sep-2575-server-rejects-undeclared-capability: the
#    tool now asserts error.data.requiredCapabilities as the schema's
#    ClientCapabilities OBJECT ({"sampling":{}}) — exactly what the SDK has
#    always emitted. That check now SUCCEEDS.
#  * #371 (alpha.8) fixed the http-custom-headers fixture to use
#    spec-permitted x-mcp-header types; the SDK's spec-faithful rejection of
#    number-typed x-mcp-header now passes 18/18 and LEFT this baseline.
#  * #372 (alpha.8) changed missing-prerequisite checks from SKIPPED to a
#    hard "Not testable" FAILURE — the origin of the current server-stateless
#    entry below.
#
# Prior pin history (0.2.0-alpha.2 -> 0.2.0-alpha.7, 2026-06-27):
#  * alpha.5 (#353) adopted the SEP-2907 draft error-code renumber —
#    HeaderMismatch -32001->-32020, MissingRequiredClientCapability
#    -32003->-32021, UnsupportedProtocolVersion -32004->-32022 — which the
#    SDK emits.
#  * alpha.4 (#343/#341) tightened the stateless server checks (HTTP 400 on
#    invalid per-request _meta, error.data.requested echo on
#    unsupported-version); the SDK already satisfies these.
#  * alpha.3 (#331) retired the RC-window DRAFT-2026-v1 wire identifier and
#    alpha.5 (#347) made the hand-rolled client-direction mocks answer
#    server/discover — the changes behind the json-schema-ref-no-deref entry
#    below (and the since-cleared request-metadata entry above).
#
# WS4 Tasks extension (SEP-2663) scenario gating note (re-verified
# 2026-07-01 @ alpha.9 — #372's skip->fail change did NOT break any Tasks
# scenario; the fixtures are all present, so the eight passers still pass):
#  The 0.2.0-alpha.9 tool registers its 10 SEP-2663 Tasks scenarios
#  (tasks-lifecycle, tasks-capability-negotiation, tasks-wire-fields,
#  tasks-request-state-removal, tasks-mrtr-input, tasks-request-headers,
#  tasks-dispatch-and-envelope, tasks-status-notifications,
#  tasks-required-task-error, tasks-mrtr-composition) in its `pending`
#  suite, NOT the `draft` suite, so `--suite draft` does not select them.
#  everything-server.php exposes the fixtures they need via enableTasks(),
#  and run-conformance.php's server-draft/draft gate runs each explicitly
#  after the suite (DRAFT_SERVER_EXTRA_SCENARIOS) so they ARE evaluated
#  against this baseline. Of the ten: EIGHT pass, tasks-status-notifications
#  is SKIPPED by the tool itself (0 checks executed — it is pending the
#  tool's own subscriptions/listen rewrite, not an SDK gap), and
#  tasks-mrtr-composition is the one expected failure (entry below). They are
#  additionally covered by the SDK's own end-to-end tests
#  (tests/Server/TasksExtensionTest.php, HTTP and stdio) and TaskManager unit
#  tests. Re-evaluate at WS7 convergence.

server:
  # --- Fixture-contract mismatch (root cause re-verified 2026-07-03) ---
  - server-stateless
    # 27/28 checks pass at alpha.9. The one failing check is
    # sep-2575-http-server-no-independent-requests-on-stream: the scenario
    # builds ONE generic request _meta with
    #   "io.modelcontextprotocol/clientCapabilities": {}   (empty)
    # and reuses it for every probe, including a tools/call against our
    # test_streaming_elicitation fixture. Our fixture ELICITS
    # (everything-server.php registers it with ElicitationContext), so the
    # SDK — enforcing the spec's capability MUSTs ("A server MUST NOT rely
    # on capabilities the client has not declared ... MUST return
    # MissingRequiredClientCapabilityError (-32021)", draft
    # basic/index.mdx §_meta) — rejects the empty-capabilities call, and
    # since tool #372 (alpha.8) turned unexercisable checks from SKIPPED
    # into hard failures, the stream probe scores "Not testable".
    #
    # Cross-checked 2026-07-03 against upstream sources: the scenario's
    # documentation NEVER requires this fixture to elicit — only the tool's
    # NAME suggests it. Three upstream sources agree the intended contract
    # is a plain (non-eliciting) streaming diagnostic:
    #  * The check's own logic fails any stream frame carrying a top-level
    #    request, and an MRTR InputRequiredResult ends the call without
    #    exercising the stream — an eliciting fixture cannot satisfy the
    #    check under ANY capability declaration.
    #  * The conformance repo's own reference server
    #    (examples/servers/typescript/everything-server.ts) implements
    #    test_streaming_elicitation as progress-notification + final result
    #    ("Diagnostic tool validating response progress streams") — it does
    #    not elicit.
    #  * The TypeScript SDK's conformance fixture does the same, commenting
    #    "It must not elicit (the scenario declares no `elicitation`
    #    capability); the referee's own reference server does not elicit
    #    here either" — and passes server-stateless 28/28 at alpha.9.
    # The SDK's capability enforcement is spec-correct and unchanged (the
    # sibling checks sep-2575-server-rejects-undeclared-capability and
    # sep-2575-missing-capability-http-400 reward it and pass).
    #
    # NOT RESOLVED YET — held for upstream clarification (a judgment call,
    # not a committed plan): the fixture contract is ambiguous upstream
    # (documented only by the check code and the reference server's
    # behavior, never in the scenario text), and our eliciting fixture
    # demonstrates real spec behavior (SEP-2322 elicitation-as-
    # InputRequiredResult under capability enforcement). Rewriting it as a
    # non-eliciting streaming diagnostic would clear this entry with no SDK
    # change and match the reference implementations, but other SDKs
    # matching each other is not the same as the contract being settled —
    # PR #383 + issue #382 (filed 2026-07-02, proposing the probe declare
    # the elicitation capability) put exactly this question to the
    # maintainers: declare the capability on the probe, or document the
    # fixture as deliberately capability-free. Await their answer (they may
    # well point at their reference server's non-eliciting implementation)
    # before touching the fixture. Re-check at the next pin bump.
    #
    # The two SHOULD-level warnings (prompts/tools list_changed delivered
    # to an open subscriptions/listen stream) pass only where PHP's CLI
    # server can run multiple workers (PHP_CLI_SERVER_WORKERS, POSIX only —
    # run-conformance.php sets it automatically). On Windows dev machines
    # the concurrent events cannot be exercised locally; warnings do not
    # fail the scenario either way.

  # --- SEP-2663 Tasks: synchronous-execution-model behavioral choice ---
  - tasks-mrtr-composition
    # INTENTIONAL MODEL CHOICE, not a bug — verified 2026-07-03 against the
    # ext-tasks spec and SEP-2663 text that both behaviors are
    # spec-permitted:
    #  * The only normative sentence on the composition is a CONDITIONAL
    #    SHOULD about ordering, not mechanism choice: "Server
    #    implementations THAT USE multi round-trip requests in conjunction
    #    with task creation ... SHOULD resolve all MRTR exchanges
    #    synchronously before responding with a CreateTaskResult"
    #    (ext-tasks specification/draft/tasks.md §Task Creation).
    #  * SEP-2663's rationale is explicitly permissive: a tool "MAY use
    #    them sequentially", and "prohibiting this would require imposing
    #    an artificial constraint".
    #  * The spec's before/during division ("a server that needs client
    #    input BEFORE returning a CreateTaskResult uses the MRTR flow ...
    #    input DURING task execution uses inputRequests/inputResponses")
    #    is descriptive, not RFC-2119 — and it presumes an execution model
    #    where task creation and work-start are separable moments.
    # The scenario's one check, sep-2663-mrtr-synchronous-before-task-
    # creation, operationalizes that descriptive sentence as mandatory:
    # its fixture contract requires round 1 = InputRequiredResult with NO
    # taskId and round 2 = CreateTaskResult. The SDK instead creates the
    # handle immediately and surfaces input requests IN-TASK via the
    # tasks/get `inputRequests` map answered by tasks/update — the sibling
    # scenario tasks-mrtr-input exercises this path and the SDK passes
    # 3/3. The two patterns are mutually exclusive for a single tool, and
    # under the shared-hosting synchronous execution model (the tool body
    # runs within the creating request) the task exists before the body
    # runs, so pre-work input IS in-task input; handle-first is also
    # strictly more durable here (an interrupted MRTR exchange loses its
    # wire-held requestState; an interrupted in-task exchange survives via
    # tasks/get). No reference-SDK comparison exists: TypeScript and
    # Python both baseline ALL nine runnable SEP-2663 scenarios (extension
    # not implemented) as of their 2026-07 v2 betas. Of the other nine
    # scenarios, eight pass and tasks-status-notifications is skipped by
    # the tool (0 checks, pending its subscriptions/listen rewrite).
    # Upstream ask (SEP-2484 candidate): clarify that both spec-permitted
    # sequences are conformant. Re-evaluate at WS7 convergence, and again
    # if a reference SDK ships Tasks with the composition.

client:
  # --- Issuer-binding strictness (root cause re-verified 2026-07-03) ---
  - auth/pre-registration
    # STRICT-READING DIVERGENCE, pending a deliberate decision: the
    # 2026-07-28 draft's Authorization Server Binding rule says clients
    # using pre-registered credentials "MUST associate those credentials
    # with the specific authorization server that issued them, keyed by
    # the authorization server's `issuer` identifier"
    # (basic/authorization/client-registration.mdx). The scenario supplies
    # only {client_id, client_secret} as context — no issuer
    # (conformance src/scenarios/client/auth/pre-registration.ts). The
    # SDK's draft-default is MANDATORY binding
    # (OAuthConfiguration::$allowUnboundClientCredentials = false), so the
    # draft-track everything-client refuses to send a token request with
    # unbound credentials and the pre-registration-auth check fails
    # ("Client did not make a token request"; 2/3 checks pass). The stable
    # track still passes 14/14 — there the published 2025-11-25 spec has
    # no binding rule and the everything-client opts into
    # allowUnboundClientCredentials.
    #
    # Cross-checked 2026-07-03: the spec is SILENT on credentials with no
    # recorded issuer (the MUSTs govern association, storage keying, and
    # cross-AS reuse — verified absence of any acceptance/refusal rule for
    # the unbound case), and both reference SDKs read the rule as "enforce
    # a binding only when one is recorded":
    #  * TypeScript: trust-on-first-use — an unstamped credential is USED
    #    with a one-time console.warn, then back-stamped with the first
    #    resolved issuer; the typed mismatch error fires only when a
    #    recorded issuer names a DIFFERENT AS
    #    (packages/client/src/client/auth.ts, discardIfIssuerMismatch()).
    #  * Python: unbound credentials "carry no binding to enforce" — used
    #    silently, never stamped (src/mcp/client/auth/utils.py,
    #    credentials_match_issuer(): `if client_info.issuer is None:
    #    return True`).
    #  * Upstream position: conformance issue #285 (closed) deems the
    #    key-by-issuer state requirements "not protocol-observable"; the
    #    MUST is tested via the separate auth/authorization-server-
    #    migration scenario (PR #286), whose enforcement path this SDK's
    #    recorded-binding checks satisfy.
    # The strict default remains DEFENSIBLE for this SDK (a fresh PHP-FPM
    # process starts unpinned, so TS-style in-memory first-use pinning is
    # weaker here — see the OAuthConfiguration docblock), but it is
    # stricter than both reference SDKs and than the surface upstream
    # tests. RESOLUTION OPTIONS (human decision, not changed silently):
    # (a) adopt trust-on-first-use as the draft default, keeping strict
    # refusal as an opt-in; or (b) keep the strict default and opt the
    # draft-track everything-client into allowUnboundClientCredentials,
    # mirroring the stable track. Optional upstream ask: the scenario
    # could supply the issuer it already knows when building context so
    # strict clients are testable (no existing issue covers this).
    #
    # NOTE: --suite draft selects only DRAFT-2026-v1-exclusive scenarios,
    # and auth/pre-registration is tagged [2025-11-25, DRAFT-2026-v1], so
    # it is NOT in the draft suite. run-conformance.php therefore runs it
    # explicitly after the suite on the aggregate `draft`/`client-draft`
    # gate (see DRAFT_CLIENT_EXTRA_SCENARIOS) so this entry is actually
    # evaluated — otherwise a stale entry would pass CI silently. Keep
    # DRAFT_CLIENT_EXTRA_SCENARIOS in sync with any client entry here that
    # falls outside the draft suite. Re-check at every draft-pin bump.

  # (CLEARED at 0.2.0-alpha.9) http-custom-headers — upstream PR #371
  # (alpha.8) fixed the fixture to use spec-permitted x-mcp-header types
  # (priority number->integer, float_val annotation dropped), so the SDK's
  # spec-faithful rejection of number-typed x-mcp-header now passes 18/18.
  # Removed from this baseline at the alpha.9 bump; the companion
  # http-invalid-tool-headers (11/11) and http-custom-header-server-validation
  # (server track, 9/9) continue to pass.

  # --- Upstream mock inconsistency (root cause re-verified 2026-07-03) ---
  - json-schema-ref-no-deref
    # UPSTREAM MOCK BUG, unreported as of 2026-07-03 (searched the
    # conformance repo for issues/PRs; #347 introduced the discover shim
    # without aligning the transport — WORTH FILING): the scenario's mock
    # (src/scenarios/client/json-schema-ref-deref.ts) special-cases
    # server/discover to advertise supportedVersions:["2026-07-28"], but
    # routes every other request through the bundled TypeScript SDK v1
    # (^1.29.0, SUPPORTED_PROTOCOL_VERSIONS topping out at 2025-11-25),
    # whose STATEFUL transport 400s any request stamped
    # MCP-Protocol-Version: 2026-07-28 with -32000. A client that obeys
    # the discover response cannot then call tools/list. The PHP client in
    # protocolMode 'auto' probes discover, the probe SUCCEEDS, so it
    # adopts the advertised 2026-07-28 and sends an enveloped tools/list —
    # which the mock's own transport rejects (verified: client log shows
    # discover -> supportedVersions:["2026-07-28"] -> tools/list -> HTTP
    # 400 -32000). The draft spec has no rule for "discover advertised X
    # but the server rejects X", and its generic rules forbid the only
    # escape: a recognized modern error identifies a modern server and the
    # client retries with an advertised version "rather than falling back"
    # (versioning.mdx §Backward Compatibility) — but the advertised
    # version IS the rejected one, via a non--32022 error.
    #
    # Cross-checked 2026-07-03: NEITHER reference SDK survives this mock
    # generically — both sidestep it per-scenario in their conformance
    # harnesses, which is the sanctioned pattern:
    #  * TypeScript: client negotiation defaults to 'legacy' (no discover
    #    probe), and the scenario handler in
    #    test/conformance/src/everythingClient.ts deliberately does not
    #    opt into 'auto' — it never sees the misleading advertisement. TS
    #    docs its probe classifier as never demoting an established
    #    modern connection, so a TS 'auto' client would fail identically.
    #  * Python: client defaults to 'auto', so its handler PINS
    #    mode="legacy" with a docstring describing this exact flaw: "its
    #    mock server only speaks the handshake-era lifecycle and 400s a
    #    modern-stamped tools/list. The check is lifecycle-agnostic so
    #    this is harmless" (.github/actions/conformance/client.py).
    # The SEP-2106 behavior the scenario actually tests (no network $ref
    # dereference, 2020-12 schema pass-through) is version-independent
    # and unchanged in the SDK.
    #
    # NOT RESOLVED YET — held as a judgment call: pinning the
    # json-schema-ref-no-deref handler in everything-client.php to the
    # legacy handshake would clear this entry with no SDK change and match
    # the reference harnesses, but it also means deliberately steering the
    # client AROUND the mock's advertised modern path, and the reference
    # SDKs having done so does not settle whether that is the sanctioned
    # contract or two harnesses working around the same unreported bug.
    # Preferred sequence: file the upstream issue for the
    # discover-vs-transport inconsistency first (none exists as of
    # 2026-07-03) and let the fix or the maintainers' guidance determine
    # whether a harness-side legacy pin is appropriate in the interim. The
    # SDK's 'auto' behavior stays as-is: it is the spec-faithful reading of
    # a successful discover response. Re-check at the next pin bump (a
    # future bundled-SDK bump adding 2026-07-28 support would also clear
    # it upstream).

  # (CLEARED at pin 0.2.0-alpha.9, 2026-07-03, via SDK FIX) request-metadata
  # — see the clearance note in the header: negotiate() now performs the
  # spec's select-and-continue corrective retry exactly once, same version
  # permitted, matching the TypeScript and Python reference clients.
