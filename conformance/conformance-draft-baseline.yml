# MCP Conformance Draft-Track Baseline
#
# Expected failures for the DRAFT track only: the `draft` suite of the
# pinned 0.2.0-alpha conformance tool (npm alias "conformance-draft" in
# package.json), which carries the 2026-07-28 draft-spec scenarios.
# The stable track keeps its own baseline in conformance-baseline.yml —
# the two files are tied to different installed tool versions and are
# curated independently (see docs/v2-development-plan.md, WS7).
#
# The no-shortcut rule in conformance/README.md applies to this file
# exactly as it does to the stable baseline: every entry has a documented
# root cause and either a plan or an explicit not-pursuing rationale;
# entries only shrink within a pinned tool version. A deliberate pin bump
# may legitimately add entries for genuinely-new upstream behavior, each
# with its own root cause (recorded below).
#
# Last updated: 2026-07-01 (draft pin bumped 0.2.0-alpha.7 -> 0.2.0-alpha.9)
# Conformance tool version: 0.2.0-alpha.9 (draft pin)
#
# Pin-bump note (0.2.0-alpha.7 -> 0.2.0-alpha.9): two builds, three PRs, all
# draft-track only (stable `latest` unchanged at 0.1.16). Net effect on this
# baseline: TWO entries cleared, ONE entry's root cause replaced, everything
# else unchanged. No SDK code change accompanies this bump — the two cleared
# entries are upstream fixes catching up to already-spec-correct SDK behavior.
#  * #376 (alpha.9) fixed sep-2575-server-rejects-undeclared-capability: the
#    tool now asserts error.data.requiredCapabilities as the schema's
#    ClientCapabilities OBJECT ({"sampling":{}}) instead of a string array —
#    exactly what the SDK has always emitted. That check now SUCCEEDS. This
#    was the long-standing "upstream tool bug" server-stateless entry; it is
#    resolved upstream (the SEP-2484 candidate the prior baseline named).
#  * #371 (alpha.8) fixed the http-custom-headers fixture to use
#    spec-permitted x-mcp-header types (priority number->integer, float_val
#    annotation dropped). The SDK's spec-faithful rejection of number-typed
#    x-mcp-header now passes: http-custom-headers is 18/18 and LEFT this
#    baseline (was flagged as a stale entry until removed).
#  * #372 (alpha.8) changed missing-prerequisite checks from SKIPPED to a
#    hard "Not testable" FAILURE. This did NOT break any Tasks scenario (the
#    fixtures are present), but it converted one previously-skipped
#    server-stateless check into a failure — see the rewritten
#    server-stateless entry below. It is the reason server-stateless remains
#    a one-failure entry (a DIFFERENT failure than before the bump).
#
# Prior pin history (0.2.0-alpha.2 -> 0.2.0-alpha.7, 2026-06-27):
#  * alpha.5 (#353) adopted the SEP-2907 draft error-code renumber —
#    HeaderMismatch -32001->-32020, MissingRequiredClientCapability
#    -32003->-32021, UnsupportedProtocolVersion -32004->-32022 — which the
#    SDK emits.
#  * alpha.4 (#343/#341) tightened the stateless server checks (HTTP 400 on
#    invalid per-request _meta, error.data.requested echo on
#    unsupported-version); the SDK already satisfies these.
#  * alpha.3 (#331) retired the RC-window DRAFT-2026-v1 wire identifier and
#    alpha.5 (#347) made the hand-rolled client-direction mocks answer
#    server/discover — the two changes behind the json-schema-ref-no-deref
#    and request-metadata client entries below.
#
# WS4 Tasks extension (SEP-2663) scenario gating note (re-verified
# 2026-07-01 @ alpha.9 — #372's skip->fail change did NOT break any Tasks
# scenario; the fixtures are all present, so the eight passers still pass):
#  The 0.2.0-alpha.9 tool registers its 10 SEP-2663 Tasks scenarios
#  (tasks-lifecycle, tasks-capability-negotiation, tasks-wire-fields,
#  tasks-request-state-removal, tasks-mrtr-input, tasks-request-headers,
#  tasks-dispatch-and-envelope, tasks-status-notifications,
#  tasks-required-task-error, tasks-mrtr-composition) in its `pending`
#  suite, NOT the `draft` suite, so `--suite draft` does not select them.
#  everything-server.php exposes the fixtures they need via enableTasks(),
#  and run-conformance.php's server-draft/draft gate runs each explicitly
#  after the suite (DRAFT_SERVER_EXTRA_SCENARIOS) so they ARE evaluated
#  against this baseline. Of the ten: EIGHT pass, tasks-status-notifications
#  is SKIPPED by the tool itself (0 checks executed — it is pending the
#  tool's own subscriptions/listen rewrite, not an SDK gap), and
#  tasks-mrtr-composition is the one expected failure (entry below). They are
#  additionally covered by the SDK's own end-to-end tests
#  (tests/Server/TasksExtensionTest.php, HTTP and stdio) and TaskManager unit
#  tests. Re-evaluate at WS7 convergence.

server:
  # --- One upstream tool bug (NEW root cause at alpha.9; see history below) ---
  - server-stateless
    # 27/28 checks pass at alpha.9 (up from 26/27 at alpha.7). The prior
    # failing check — sep-2575-server-rejects-undeclared-capability, the
    # requiredCapabilities string-array-vs-object tool bug — was FIXED
    # upstream by #376 (alpha.9) and now SUCCEEDS: the tool asserts the
    # ClientCapabilities OBJECT ({"sampling": {}}) the SDK has always emitted.
    #
    # The one remaining failing check is NOW a DIFFERENT one:
    # sep-2575-http-server-no-independent-requests-on-stream (UPSTREAM TOOL
    # BUG introduced by #372, alpha.8; not pursued in the SDK). Root cause,
    # verified against the tool's vendored scenario source
    # (node_modules/conformance-draft/dist/index.js, class server-stateless):
    # the scenario builds ONE generic request _meta with
    #   "io.modelcontextprotocol/clientCapabilities": {}   (empty)
    # and reuses it for every probe. This check drives the streaming probe by
    # calling tools/call name=test_streaming_elicitation with those EMPTY
    # capabilities. That fixture legitimately requires the elicitation
    # capability, so the SDK — per SEP-2575 — MUST reject the call with
    # -32021 MissingRequiredClientCapability (the very behavior the sibling
    # check sep-2575-server-rejects-undeclared-capability REWARDS two checks
    # earlier, using test_missing_capability/sampling). Before #372 this
    # unexercisable check reported SKIPPED; #372 removed that escape hatch and
    # now scores it as a hard "Not testable" FAILURE:
    #   "the 'test_streaming_elicitation' call was rejected (code -32021), so
    #    the response stream could not be exercised".
    # The probe never declares the elicitation capability its own fixture
    # needs, so a spec-correct capability-enforcing server cannot pass it as
    # written. The only ways to "pass" would be to (a) strip the capability
    # requirement from the fixture — an engineered workaround that defeats the
    # fixture's purpose (demonstrating SEP-2322 elicitation-as-InputRequiredResult,
    # never a server-initiated stream request) and violates the no-shortcuts
    # rule, or (b) stop enforcing capability declaration — a spec violation
    # that would fail sep-2575-server-rejects-undeclared-capability. Official
    # text wins: the SDK keeps the spec-mandated -32021 and this check stays
    # an expected failure until fixed upstream. Strong SEP-2484 candidate:
    # the stream probe should declare the elicitation capability (or the
    # fixture contract should be a capability-free streaming diagnostic).
    # Re-check at the next pin bump. The companion capability checks
    # (sep-2575-server-rejects-undeclared-capability,
    # sep-2575-missing-capability-http-400) both pass.
    #
    # The two SHOULD-level warnings (prompts/tools list_changed delivered
    # to an open subscriptions/listen stream) pass only where PHP's CLI
    # server can run multiple workers (PHP_CLI_SERVER_WORKERS, POSIX only —
    # run-conformance.php sets it automatically). On Windows dev machines
    # the concurrent events cannot be exercised locally; warnings do not
    # fail the scenario either way.

  # --- SEP-2663 Tasks: synchronous-execution-model behavioral choice ---
  - tasks-mrtr-composition
    # INTENTIONAL MODEL CHOICE, not a bug (both behaviors are spec-permitted):
    # the scenario's one check, sep-2663-mrtr-synchronous-before-task-creation,
    # mandates that a task-augmented tool gather client input via an MRTR loop
    # on tools/call (round 1 = InputRequiredResult with NO taskId) and only
    # CREATE the task on the final round (round 2 = CreateTaskResult). The SDK
    # uses the complementary spec mechanism instead: a task-augmented tool
    # creates the handle immediately and surfaces input requests IN-TASK via
    # the tasks/get `inputRequests` map answered by tasks/update (SEP-2663's
    # input-during-a-task path), which the sibling scenario tasks-mrtr-input
    # exercises and the SDK passes 3/3. The two patterns are mutually
    # exclusive for a single tool, and the shared-hosting synchronous
    # execution model (the SDK runs the tool body within the creating request
    # rather than as a background worker) makes "gather input, THEN start
    # long-running task work" indistinguishable from in-task input — so the
    # SDK implements the single coherent in-task model. Of the other nine
    # SEP-2663 scenarios, eight pass and tasks-status-notifications is skipped
    # by the tool (0 checks, pending its subscriptions/listen rewrite).
    # Re-evaluate at WS7 convergence; candidate for an upstream note that both
    # sequences are conformant (SEP-2484).

client:
  # --- Issuer-binding drift (re-checked at alpha.7: unchanged) ---
  - auth/pre-registration
    # UPSTREAM SPEC/TOOL DRIFT, not pursued in the SDK: the 2026-07-28
    # draft's Authorization Server Binding rule requires pre-registered
    # credentials to be keyed by the issuer that registered them ("MUST
    # associate those credentials with the specific authorization server
    # that issued them, keyed by the authorization server's `issuer`
    # identifier"), but the pinned 0.2.0-alpha.7 tool still supplies only
    # {client_id, client_secret} as scenario context — no issuer — even
    # though the AS URL is known when the context is built. The SDK's
    # draft-default is mandatory issuer binding, so the draft-track
    # everything-client (spawned with --track=draft) correctly refuses to
    # send a token request with unbound credentials and the scenario's
    # pre-registration-auth check fails ("Client did not make a token
    # request"; 2/3 checks pass). The stable track still passes 14/14 —
    # there the published 2025-11-25 spec has no binding rule and the
    # everything-client opts into the SDK's explicit
    # allowUnboundClientCredentials legacy compatibility.
    #
    # NOTE: --suite draft selects only DRAFT-2026-v1-exclusive scenarios,
    # and auth/pre-registration is tagged [2025-11-25, DRAFT-2026-v1], so
    # it is NOT in the draft suite. run-conformance.php therefore runs it
    # explicitly after the suite on the aggregate `draft`/`client-draft`
    # gate (see DRAFT_CLIENT_EXTRA_SCENARIOS) so this entry is actually
    # evaluated — otherwise a stale entry would pass CI silently. Keep
    # DRAFT_CLIENT_EXTRA_SCENARIOS in sync with any client entry here that
    # falls outside the draft suite. Re-check at every draft-pin bump:
    # expect upstream to either add issuer context to the scenario or
    # assert the strict refusal. Candidate for an upstream issue per
    # SEP-2484. See the upstream drift record in
    # docs/v2-development-plan.md (WS3).

  # (CLEARED at 0.2.0-alpha.9) http-custom-headers — upstream PR #371
  # (alpha.8) fixed the fixture to use spec-permitted x-mcp-header types
  # (priority number->integer, float_val annotation dropped), so the SDK's
  # spec-faithful rejection of number-typed x-mcp-header now passes 18/18.
  # Removed from this baseline at the alpha.9 bump; the companion
  # http-invalid-tool-headers (11/11) and http-custom-header-server-validation
  # (server track, 9/9) continue to pass.

  # --- Two upstream-drift entries surfaced by the alpha.3/alpha.5 changes
  #     (carried over the alpha.7 bump; unchanged at alpha.9) ---
  - json-schema-ref-no-deref
    # UPSTREAM TOOL INCONSISTENCY, not pursued in the SDK: alpha.5 (#347)
    # made this scenario's hand-rolled mock answer server/discover, but the
    # mock routes actual method calls through the TypeScript SDK's STATEFUL
    # StreamableHTTPServerTransport, which only supports <=2025-11-25. Its
    # discover therefore advertises supportedVersions:["2026-07-28"] while
    # its transport rejects a 2026-07-28 request with
    #   -32000 "Bad Request: Unsupported protocol version: 2026-07-28
    #   (supported versions: 2025-11-25, 2025-06-18, ...)"
    # The PHP client is spec-correct: in protocolMode 'auto' it probes
    # server/discover, the probe SUCCEEDS, so it adopts the advertised
    # 2026-07-28 and sends an enveloped tools/list — which the mock's own
    # transport then 400s (verified: client log shows discover ->
    # supportedVersions:["2026-07-28"] -> tools/list -> HTTP 400 -32000).
    # At alpha.2 the same mock did NOT answer discover, so the auto client
    # fell back to the legacy handshake and the scenario passed (it had
    # left the WS1 baseline). The SEP-2106 behavior the scenario actually
    # tests (no network $ref dereference, 2020-12 schema pass-through) is
    # version-independent and unchanged in the SDK. Re-check at the next
    # pin bump; candidate for an upstream scenario fix per SEP-2484 (a
    # draft mock should serve a 2026-07-28-capable transport, or not
    # advertise a version its transport rejects).

  - request-metadata
    # UPSTREAM SCENARIO DEGENERACY from the DRAFT-2026-v1 retirement, not
    # pursued in the SDK: the mock simulates a one-time first-request
    # rejection to exercise the SHOULD-level retry check
    # (sep-2575-client-retry-supported-version) — it rejects the client's
    # first probe with -32022 UnsupportedProtocolVersion and expects a
    # retry using a version from data.supported. At alpha.2 the mock
    # advertised supported:["DRAFT-2026-v1"], a DISTINCT identifier from
    # the client's first attempt (2026-07-28), so the SDK adopted it and
    # retried and the scenario passed (it had left the WS3 baseline).
    # alpha.3 (#331) retired DRAFT-2026-v1; the alpha.7 mock now rejects
    # the 2026-07-28 probe while advertising supported:["2026-07-28"] — the
    # SAME version just attempted (verified: client log shows discover ->
    # -32022 data.supported:["2026-07-28"] requested:"2026-07-28"). The
    # SDK's negotiate() excludes already-attempted versions from the retry
    # (an infinite-loop guard: a server that rejects version X cannot
    # honestly advertise ONLY X), so pickAdvertisedModernVersion() returns
    # null and negotiate() throws rather than re-sending the identical
    # rejected version. The retry check stays WARNING (it never fails), but
    # the thrown connection crashes the everything-client, so the tool
    # flags the scenario. The SDK behavior is spec-defensible (do not loop
    # on an identical rejected version; SEP-2575 forbids falling back to
    # initialize from a modern server). Re-check at the next pin bump and at
    # WS7 convergence: expect upstream to restore a distinct retry version
    # or settle DRAFT-2026-v1's replacement. Whether the SDK should retry an
    # already-attempted-but-advertised version exactly once is a
    # spec-clarification question flagged for human/upstream review
    # (SEP-2484), deliberately NOT changed silently here.
