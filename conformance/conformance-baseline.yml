# MCP Conformance Baseline
#
# Lists expected failures with root causes. The conformance tool uses this
# to distinguish regressions (previously-passing tests that fail) from known
# limitations (tests that have never passed).
#
# Each entry documents WHY the test fails so SDK fixes can be targeted in future updates.
#
# Usage (via composer scripts — recommended):
#   composer conformance            # Run both server and client tests
#   composer conformance-server     # Run server tests only
#   composer conformance-client     # Run client tests only
#
# Last updated: 2026-04-17
# Conformance tool version: 0.1.16

server:
  # --- SDK limitation: HTTP transport returns batched JSON, not SSE streams ---
  - tools-call-with-progress
    # _meta.progressToken is now passed to tool callbacks via ProgressContext,
    # and progress notifications are correctly batched in the JSON response.
    # However, the conformance test client expects notifications via SSE streaming
    # (onprogress callback), which requires the server to stream events during
    # the request rather than batching them in the response body.

  # --- SDK limitation: HTTP transport is stateless (no server-to-client requests) ---
  - tools-call-sampling
    # sampling/createMessage requires the server to send a request to the
    # client and wait for a response. The PHP HTTP transport is stateless
    # per-request, so BaseSession::sendRequest() cannot block for a client
    # response. This works in stdio mode but not HTTP mode.

  - tools-call-elicitation
    # Same root cause as tools-call-sampling: elicitation/create is a
    # server-to-client request that requires bidirectional communication.

  - elicitation-sep1034-defaults
    # Same root cause: requires server-to-client elicitation request.

  - elicitation-sep1330-enums
    # Same root cause: requires server-to-client elicitation request.

client:
  # --- SDK limitation: no standalone GET SSE stream ---
  - elicitation-sep1034-client-defaults
    # SEP-1034 capability + defaults-fill logic is implemented on ClientSession
    # (see Client::onElicit, ElicitationCapability::applyDefaults) and fully
    # covered by tests/Client/ClientSessionElicitationTest.php. This specific
    # conformance test fails at the transport layer: the test server calls
    # `Server.request({elicitation/create})` without a `relatedRequestId`, so
    # the TS StreamableHTTPServerTransport routes the request onto the
    # standalone GET SSE stream. The PHP transport probes for that stream in
    # connect() *before* initialize (no session id yet → 400) and never re-
    # opens it, and sendMessage() is single-handle curl_exec() with no way
    # to pump another stream while it's blocking. Unblocking this test
    # requires (a) re-opening the standalone GET SSE with the session id
    # after initialize and (b) pumping it concurrently via curl_multi during
    # blocking POSTs — a transport-level change that belongs in its own PR.

  # --- OAuth: not implemented ---
  - auth/client-credentials-jwt
    # No client_credentials grant_type or JWT assertion (client_assertion,
    # client_assertion_type) implementation.

  - auth/client-credentials-basic
    # No client_credentials grant_type implementation.

  - auth/cross-app-access-complete-flow
    # 8 of 10 assertions pass. RFC 8707 resource parameter support exists
    # but the full cross-app access flow has gaps.
