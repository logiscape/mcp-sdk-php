# MCP Conformance Baseline
#
# Lists expected failures with root causes. The conformance tool uses this
# to distinguish regressions (previously-passing tests that fail) from known
# limitations (tests that have never passed).
#
# Each entry documents WHY the test fails so SDK fixes can be targeted in future updates.
#
# Usage (via composer scripts — recommended):
#   composer conformance            # Run both server and client tests
#   composer conformance-server     # Run server tests only
#   composer conformance-client     # Run client tests only
#
# Last updated: 2026-04-19
# Conformance tool version: 0.1.16

server:
  # --- SDK limitation: sampling over HTTP still needs the resume pattern ---
  - tools-call-sampling
    # sampling/createMessage requires the server to send a request to the
    # client and wait for a response. The elicitation suspend/resume pattern
    # (ElicitationSuspendException + PendingElicitation + request-id-keyed
    # stream routing) works for elicitation over HTTP as of the streamable
    # HTTP rework; generalising it to sampling requires a shared
    # ClientRequestSuspendException path and a sampling-specific responder.

  - elicitation-sep1330-enums
    # Enum support in elicitation schemas: partially implemented but the
    # conformance tool's fixture exercises edge cases the SDK's elicitation
    # schema handling does not yet cover. Tracked separately from the
    # transport-layer fixes.

client:
  # --- OAuth: not implemented ---
  - auth/client-credentials-jwt
    # No client_credentials grant_type or JWT assertion (client_assertion,
    # client_assertion_type) implementation.

  - auth/client-credentials-basic
    # No client_credentials grant_type implementation.

  - auth/cross-app-access-complete-flow
    # 8 of 10 assertions pass. RFC 8707 resource parameter support exists
    # but the full cross-app access flow has gaps.
