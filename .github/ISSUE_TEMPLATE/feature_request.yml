name: Feature request
description: Propose a new feature, an enhancement, or tracking of a new MCP specification item.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing an enhancement. Please keep in mind that this SDK aims to track the MCP specification faithfully — see [CONTRIBUTING.md](https://github.com/logiscape/mcp-sdk-php/blob/main/CONTRIBUTING.md) and [ROADMAP.md](https://github.com/logiscape/mcp-sdk-php/blob/main/ROADMAP.md) for the guiding principles.

  - type: checkboxes
    id: prechecks
    attributes:
      label: Before you submit
      options:
        - label: I have searched [existing issues](https://github.com/logiscape/mcp-sdk-php/issues?q=is%3Aissue) for a similar request.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case or pain point this feature would address.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: If you have a specific idea, describe it. Rough sketches are fine — the solution doesn't have to be final.
    validations:
      required: true

  - type: input
    id: sep
    attributes:
      label: Corresponding MCP SEP or spec section (if any)
      description: If this maps to a published MCP Specification Enhancement Proposal (SEP) or a spec section, link it.
      placeholder: "https://modelcontextprotocol.io/community/seps/…"

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you rejected them.

  - type: checkboxes
    id: compat
    attributes:
      label: Compatibility considerations
      options:
        - label: I've considered whether this would work under cPanel / Apache / PHP-FPM (see [docs/compatibility.md](https://github.com/logiscape/mcp-sdk-php/blob/main/docs/compatibility.md)).
        - label: I believe this can be added without breaking the public API.
        - label: This would be a breaking change (explained below).

  - type: textarea
    id: additional
    attributes:
      label: Additional context
